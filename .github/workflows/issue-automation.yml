name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage Issue
        uses: actions/github-script@v7
        with:
          script: |
            if (context.actor === 'github-actions[bot]') {
              console.log('Action triggered by bot, skipping.');
              return;
            }

            const labelsToEnsure = [
              { name: 'bug', color: 'd73a4a', description: "Something isn't working" },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '3e2723', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: '795548', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'fbca04', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'fbca04', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: '1d76db', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: 'c2e0c6', description: 'Issue created by first-time contributor' }
            ];

            for (const label of labelsToEnsure) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  console.log(`Error ensuring label ${label.name}:`, error.message);
                }
              }
            }

            if (context.payload.action === 'opened') {
              const title = context.payload.issue.title.toLowerCase();
              const body = (context.payload.issue.body || '').toLowerCase();
              const text = title + ' ' + body;

              const labelsToAdd = ['needs-triage'];

              if (title.includes('bug')) labelsToAdd.push('bug');
              if (title.includes('epic')) labelsToAdd.push('epic');
              if (title.includes('maintenance')) labelsToAdd.push('maintenance');

              let priority = 'priority-medium';
              const criticalKeywords = ["critical", "urgent", "production", "outage"];
              const highKeywords = ["important", "high", "blocking"];
              const mediumKeywords = ["medium", "normal"];
              const lowKeywords = ["low", "nice-to-have", "minor"];

              if (criticalKeywords.some(kw => text.includes(kw))) {
                priority = 'priority-critical';
              } else if (highKeywords.some(kw => text.includes(kw))) {
                priority = 'priority-high';
              } else if (mediumKeywords.some(kw => text.includes(kw))) {
                priority = 'priority-medium';
              } else if (lowKeywords.some(kw => text.includes(kw))) {
                priority = 'priority-low';
              }

              labelsToAdd.push(priority);

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labelsToAdd
              });
            }

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    steps:
      - name: Generate Subtasks
        uses: actions/github-script@v7
        with:
          script: |
            if (context.actor === 'github-actions[bot]') {
              console.log('Action triggered by bot, skipping.');
              return;
            }

            if (context.payload.action !== 'opened') {
              console.log('Not an opened event, skipping task breakdown.');
              return;
            }

            const parentNumber = context.payload.issue.number;
            const parentTitle = context.payload.issue.title;
            const parentBody = context.payload.issue.body || '';

            if (parentTitle.toLowerCase().includes('epic')) {
              const taskNames = [
                'Requirements Analysis',
                'Design and Architecture',
                'Implementation',
                'Testing and Documentation'
              ];

              const subIssueNumbers = [];

              for (let i = 0; i < taskNames.length; i++) {
                const taskName = taskNames[i];
                const taskNum = i + 1;
                const subTitle = `[SUBTASK] ${parentTitle} - Task ${taskNum}: ${taskName}`;
                const subBody = `Related to #${parentNumber}`;
                
                try {
                  const subIssue = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: subTitle,
                    body: subBody,
                    labels: ['enhancement', 'needs-review']
                  });
                  subIssueNumbers.push(subIssue.data.number);
                } catch (error) {
                  console.log(`Error creating subtask ${taskNum}:`, error.message);
                }
              }

              if (subIssueNumbers.length > 0) {
                const checklist = [
                  '',
                  '## Epic Tasks',
                  ...subIssueNumbers.map((num, idx) => `- [ ] #${num} - ${taskNames[idx]}`)
                ].join('\n');

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parentNumber,
                  body: parentBody ? `${parentBody}\n${checklist}` : checklist
                });
              }
            }

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    steps:
      - name: Auto Response
        uses: actions/github-script@v7
        with:
          script: |
            if (context.actor === 'github-actions[bot]') {
              console.log('Action triggered by bot, skipping.');
              return;
            }

            if (context.payload.action !== 'opened') {
              console.log('Not an opened event, skipping auto-response.');
              return;
            }

            const author = context.payload.issue.user.login;
            let isFirstIssue = false;
            try {
              const response = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                creator: author,
                state: 'all',
                per_page: 10
              });
              const userIssues = response.data.filter(item => !item.pull_request);
              isFirstIssue = userIssues.length <= 1;
            } catch (error) {
              console.log('Error checking user first issue:', error.message);
            }

            let welcomeMessage = '';
            if (isFirstIssue) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  labels: ['first-time-contributor']
                });
                welcomeMessage = 'Welcome to the repository! Thank you for creating your first issue.\n\n';
              } catch (error) {
                console.log('Error adding first-time label:', error.message);
              }
            }

            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;

            let responseComment = welcomeMessage;
            let hasResponse = false;

            if (title.includes('bug')) {
              responseComment += "Thank you for reporting this bug. Please review our Bug Report Guidelines to make sure we have all the information needed to reproduce and fix it.";
              hasResponse = true;
            } else if (title.includes('epic')) {
              responseComment += "This is an Epic issue. Please refer to our Feature Request Process for how we manage large feature checklists and task breakdowns.";
              hasResponse = true;
            } else if (title.includes('maintenance')) {
              responseComment += "Thank you for the maintenance request. Please ensure this aligns with our Maintenance Guidelines.";
              hasResponse = true;
            }

            if (hasResponse || isFirstIssue) {
              if (responseComment === '') {
                responseComment = 'Welcome to the repository! Thank you for contributing.';
              }
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  body: responseComment
                });
              } catch (error) {
                console.log('Error creating comment:', error.message);
              }
            }

            let isHighOrCritical = false;
            const criticalKeywords = ["critical", "urgent", "production", "outage"];
            const highKeywords = ["important", "high", "blocking"];

            if (criticalKeywords.some(kw => text.includes(kw)) || highKeywords.some(kw => text.includes(kw))) {
              isHighOrCritical = true;
            }

            if (isHighOrCritical) {
              let milestoneNumber = null;
              const milestoneTitle = 'v1.0.0';
              
              try {
                const milestones = await github.rest.issues.listMilestones({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open'
                });
                const existing = milestones.data.find(m => m.title === milestoneTitle);
                if (existing) {
                  milestoneNumber = existing.number;
                } else {
                  const created = await github.rest.issues.createMilestone({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: milestoneTitle
                  });
                  milestoneNumber = created.data.number;
                }
              } catch (error) {
                console.log('Error managing milestone:', error.message);
              }

              if (milestoneNumber) {
                try {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.payload.issue.number,
                    milestone: milestoneNumber
                  });
                } catch (error) {
                  console.log('Error updating issue milestone:', error.message);
                }
              }
            }

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                name: 'needs-triage'
              });
            } catch (e) {
              console.log('Could not remove needs-triage:', e.message);
            }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ['needs-review']
              });
            } catch (e) {
              console.log('Could not add needs-review:', e.message);
            }
